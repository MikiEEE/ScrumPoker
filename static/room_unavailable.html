<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Room Unavailable</title>
  <link rel="stylesheet" href="/static/app.css">
</head>

<body>
  <div class="page page-narrow">
    <header class="page-header page-header-stack">
      <div class="title-group">
        <span class="page-title">Sprint Poker</span>
        <span class="instance-badge">Room Unavailable</span>
      </div>
      <div class="header-badges">
        <a class="powered-by github-link" href="https://github.com/MikiEEE/SmallOS/tree/master" target="_blank"
          rel="noreferrer">Powered by SmallOS</a>
      </div>
    </header>

    <section class="panel hero-panel">
      <h1>This room is no longer available</h1>
      <p class="hero-copy">
        The room may have expired, been cleared after inactivity, or never existed.
        You can create a fresh room in the public setup flow.
      </p>
      <div class="button-row">
        <a class="button-link button-link-solid" href="/setupRoom">Create a new room</a>
        <a class="button-link" href="/">Back to landing</a>
      </div>
    </section>
  </div>

</html>
